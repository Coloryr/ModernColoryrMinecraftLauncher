[package]
name = "modern-coloryr-minecraft-launcher"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rust_event = "0.1.2"
slint = { version = "~1.15", features = ["backend-winit", "renderer-skia"] }
trpl = "0.3.0"

[build-dependencies]
slint-build = "~1.15"

[profile.release]
codegen-units = 1
lto = true

[workspace]
members = ["core"]
