[package]
name = "mcml"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
slint = { version = "~1.15", features = ["backend-winit", "renderer-skia"] }
trpl = "0.3.0"
mcml-core = { path = "./mcml-core" }

[build-dependencies]
slint-build = "~1.15"
tauri-winres = "0.3.5"

[profile.release]
codegen-units = 1
lto = true

[workspace]
members = ["mcml-core"]
